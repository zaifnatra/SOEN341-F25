<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Concordia University Campus Event Ticketing - Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <div class="title-bar">CONCORDIA UNIVERSITY: CAMPUS EVENT TICKETING</div>

  
   <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="account.html">ACCOUNT</a>
        <a href="events.html">EVENTS</a>
        <a href="admindashboard.html">DASHBOARD</a>
        <a href="help.html">HELP</a>
    </div>

  <div class="profile-box">
    <h2>MY PROFILE</h2>
    <div class="profile-icon">👤</div>
    <p id="profile-name">Name</p>
    <p id="profile-email">Email</p>
    <p id="profile-role">Role</p>
  </div>

  
  <div class="options">
    <div class="option">
      <img src="calendar.png" alt="events">
      <p>MY EVENTS</p>
    </div>

    
    <div class="option">
      <a href="create-event.html">
      <img src="create-event.png" alt="create event" >
      <p>CREATE EVENT</p>
      </a>
    </div>
  </div>

   <footer>
   <p>© 2025 Concordia University Campus Event Ticketing | All Rights Reserved</p>
 </footer>

  <div id="auth-btn-container"></div>
<script src="signout.js"></script>

<!-- Role-based navbar -->
<script>
fetch('/user-profile')
  .then(res => {
    if (!res.ok) throw new Error("Not logged in");
    return res.json();
  })
  .then(user => {
    const nav = document.querySelector('.navbar');
    if (!nav) return;

    // build navbar only for logged-in users
    switch (user.role) {
      case 'organizer':
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="organizerdashboard.html">DASHBOARD</a>
          <a href="help.html">HELP</a>`;
        break;
      case 'administrator':
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="admindashboard.html">DASHBOARD</a>
          <a href="help.html">HELP</a>`;
        break;
      default:
        // fallback for logged-in student
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="help.html">HELP</a>`;
    }
  })
  .catch(() => {
    // explicitly handle NOT LOGGED IN case
    const nav = document.querySelector('.navbar');
    if (!nav) return;
    nav.innerHTML = `
      <a href="index.html">HOME</a>
      <a href="account.html">ACCOUNT</a>
      <a href="events.html">EVENTS</a>
      <a href="help.html">HELP</a>`;
  });
</script>

</body>
</html>
