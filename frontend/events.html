<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concordia University - Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="title-bar">CONCORDIA UNIVERSITY: CAMPUS EVENT TICKETING</div>

  <div class="navbar">
    <a href="index.html">HOME</a>
    <a href="account.html">ACCOUNT</a>
    <a href="events.html" class="active">EVENTS</a>
    <a href="admindashboard.html">DASHBOARD</a>
    <a href="help.html">HELP</a>
  </div>

  <div id="auth-btn-container"></div>

  <div class="events-container" id="events-list">
    <p>Loading events...</p>
  </div>

   <footer>
   <p>© 2025 Concordia University Campus Event Ticketing | All Rights Reserved</p>
 </footer>

 <script>
    // Fetch and display all events from MongoDB
    async function loadEvents() {
      const eventsList = document.getElementById("events-list");

      try {
        const response = await fetch("/events");
        const events = await response.json();

        if (!Array.isArray(events) || events.length === 0) {
          eventsList.innerHTML = "<p>No events found.</p>";
          return;
        }

        eventsList.innerHTML = "";

        events.forEach((ev) => {
          const card = document.createElement("div");
          card.classList.add("event-card");

          card.innerHTML = `
            <h3>${ev.title}</h3>
            <p><strong>Date:</strong> ${ev.date}</p>
            <p><strong>Time:</strong> ${ev.time}</p>
            <p><strong>Location:</strong> ${ev.location}</p>
            <p>${ev.description || ""}</p>
            <p><strong>Tickets:</strong> ${ev.capacity} | ${ev.type}</p>
            <p><strong>Remaining:</strong> ${ev.remainingTickets ?? ev.capacity}</p>
          `;

          // Optional: display first QR code thumbnail
          if (ev.qrCodes && ev.qrCodes.length > 0) {
            const qrImg = document.createElement("img");
            qrImg.src = ev.qrCodes[0].image;
            qrImg.alt = "QR Code sample";
            qrImg.classList.add("qr-sample");
            qrImg.style.width = "100px";
            qrImg.style.marginTop = "8px";
            card.appendChild(qrImg);
          }

          eventsList.appendChild(card);
        });
      } catch (error) {
        console.error("Error loading events:", error);
        eventsList.innerHTML = "<p>Error fetching events. Please try again later.</p>";
      }
    }

    window.onload = loadEvents;
  </script>

<script src="createevent.js"></script>
<script src="signout.js"></script>

<!-- Role-based navbar -->
<script>
fetch('/user-profile')
  .then(res => {
    if (!res.ok) throw new Error("Not logged in");
    return res.json();
  })
  .then(user => {
    const nav = document.querySelector('.navbar');
    if (!nav) return;

    // build navbar only for logged-in users
    switch (user.role) {
      case 'organizer':
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="organizerdashboard.html">DASHBOARD</a>
          <a href="help.html">HELP</a>`;
        break;
      case 'administrator':
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="admindashboard.html">DASHBOARD</a>
          <a href="help.html">HELP</a>`;
        break;
      default:
        // fallback for logged-in student
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="account.html">ACCOUNT</a>
          <a href="events.html">EVENTS</a>
          <a href="help.html">HELP</a>`;
    }
  })
  .catch(() => {
    // explicitly handle NOT LOGGED IN case
    const nav = document.querySelector('.navbar');
    if (!nav) return;
    nav.innerHTML = `
      <a href="index.html">HOME</a>
      <a href="account.html">ACCOUNT</a>
      <a href="events.html">EVENTS</a>
      <a href="help.html">HELP</a>`;
  });
</script>

</body>
</html>
