<!-- Account creation-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concordia University- Create</title>
    <!-- Link to external CSS file, dont need /frontend path cause of the staticroot in js-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="title-bar">CONCORDIA UNIVERSITY: CAMPUS EVENT TICKETING</div>


     <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="account.html">ACCOUNT</a>
        <a href="events.html">EVENTS</a>
        <a href="admindashboard.html">DASHBOARD</a>
        <a href="help.html">HELP</a>
    </div>


    <div class="welcome-box">
        <form action="/createAccount" method="post">
            <h2 id="logHeader">Create Account</h2>
            <div id="login">
                <!-- Role selection -->
                <select id="role" name="role" required style="border:2px solid #083d8c; border-radius:11px; padding:12px; font-size:16px; color:#083d8c; background:white;">
                    <option value="" disabled selected>Select a role</option>
                    <option value="student">Student</option>
                    <option value="organizer">Organizer</option>
                    <option value="administrator">Administrator</option>
                </select>
                
                <!-- Basic input fields-->
                <input type="email" placeholder="Email" name="email" required>
                <input type="text" placeholder="Username" name="username">
                <input type="password" placeholder="Password" name="password">
            </div>

            <button type="submit" id="btn">Create Account</button>

            <div id="reg-link">
                <p>Already have an account?
                    <a href="signin.html">Login</a>
                </p>
            </div>
        </form>
    </div>

    <!-- Sign in button uses the same class as signout cuz of positioning -->
    <div class="signout">
        SIGN IN
    </div>

     <footer>
   <p>© 2025 Concordia University Campus Event Ticketing | All Rights Reserved</p>
 </footer>
</body>

</html>
